name: release

on:
  release:
    types:
      - published

env:
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  build:
    uses: ./.github/workflows/ci.yml

  upload-release-assets:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: HotReloadKSP
          path: HotReloadKSP
      - uses: actions/download-artifact@v8
        with:
          name: HotReloadKSP.version
      - run: tree

      - name: Create Zip
        run: |
          cd HotReloadKSP
          zip -r9 ../HotReloadKSP.zip *

      - name: Upload Release Assets
        run: |
          gh release upload --clobber ${{ github.ref_name }}  \
            HotReloadKSP.zip              \
            HotReloadKSP.version
